<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock Paper Scissors</title>
<link rel="stylesheet" href="../shared/themes.css?v=5">
<link rel="stylesheet" href="../shared/common.css?v=5">
<link rel="stylesheet" href="../shared/sidebar.css?v=5">
<link rel="stylesheet" href="style.css">
<script>window.SITE_ROOT = "../";</script>
</head>
<body data-game="rps">
  <aside id="sidebar" class="sidebar"></aside>
  <div class="content">
  <main class="game">
    <h1>Rock Paper Scissors</h1>

    <div id="tabs" class="tabs">
      <button class="tab-btn" data-tab="play">Play</button>
      <button class="tab-btn" data-tab="stats">Stats</button>
      <button class="tab-btn" data-tab="history">History</button>
      <button class="tab-btn" data-tab="ranked">Ranked</button>
      <button class="tab-btn" data-tab="themes">Themes</button>
    </div>

    <div id="playView">
      <div id="matchTypeChoice" class="difficulty">
        <button class="matchtype-btn" data-matchtype="casual">Casual</button>
        <button class="matchtype-btn" data-matchtype="ranked">Ranked</button>
      </div>

      <p id="rankDisplay" class="rank">Silver · 1000</p>
      <p id="status" class="status">Choose your move</p>

      <div id="choices" class="choices">
        <button class="choice-btn" data-choice="rock">Rock</button>
        <button class="choice-btn" data-choice="paper">Paper</button>
        <button class="choice-btn" data-choice="scissors">Scissors</button>
      </div>

      <div id="reveal" class="reveal hidden">
        <div class="reveal-side">
          <span class="reveal-label">You</span>
          <span class="reveal-choice" id="playerChoice"></span>
        </div>
        <span class="reveal-vs">VS</span>
        <div class="reveal-side">
          <span class="reveal-label">AI</span>
          <span class="reveal-choice" id="aiChoice"></span>
        </div>
      </div>

      <p id="result" class="result hidden"></p>

      <div class="controls">
        <div class="score" id="scoreRow">
          <span>Wins: <span id="score1">0</span></span>
          <span>Draws: <span id="scoreDraws">0</span></span>
          <span>Losses: <span id="score2">0</span></span>
        </div>
        <button id="playAgain" class="reset-btn hidden">Play Again</button>
      </div>
    </div>

    <div id="statsView" class="hidden">
      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-label">Current Streak</span>
          <span class="stat-value" id="statCurrentStreak">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Best Streak</span>
          <span class="stat-value" id="statBestStreak">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Total Games</span>
          <span class="stat-value" id="statTotalGames">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Total Record</span>
          <span class="stat-value" id="statTotalRecord">0-0-0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Win Rate</span>
          <span class="stat-value" id="statWinRate">0%</span>
        </div>
        <div class="stat-card">
          <span class="stat-label" id="statLast10Label">Last 10 Win Rate</span>
          <span class="stat-value" id="statLast10">0%</span>
        </div>
      </div>
      <p class="stats-note">Stats track ranked games only.</p>
    </div>

    <div id="historyView" class="hidden">
      <div id="historyList" class="history-list"></div>
      <div id="historyDetail" class="history-detail hidden">
        <button id="backToHistory" class="reset-btn">&larr; Back to list</button>
        <div id="historyDetailContent" class="history-detail-content"></div>
        <div id="historyReveal" class="reveal"></div>
      </div>
    </div>

    <div id="rankedView" class="hidden">
      <div class="ranked-summary">
        <span class="ranked-points" id="rankedPoints">1000</span>
        <span class="ranked-tier" id="rankedTier">Silver</span>
      </div>
      <div id="rankChart" class="rank-chart"></div>
      <div id="tierLadder" class="tier-ladder"></div>
      <p class="stats-note">Tracks your rank point history in ranked games.</p>
    </div>

    <div id="themesView" class="hidden">
      <div class="theme-grid">
        <button class="theme-btn" data-theme="indigo">
          <span class="theme-swatch theme-swatch-indigo"></span>
          Current
        </button>
        <button class="theme-btn" data-theme="mono">
          <span class="theme-swatch theme-swatch-mono"></span>
          Black &amp; White
        </button>
        <button class="theme-btn" data-theme="blue-green">
          <span class="theme-swatch theme-swatch-blue-green"></span>
          Blue &amp; Green
        </button>
        <button class="theme-btn" data-theme="red-white">
          <span class="theme-swatch theme-swatch-red-white"></span>
          Red &amp; White
        </button>
      </div>
    </div>
  </main>
  </div>

  <script src="../shared/theme.js?v=5"></script>
  <script src="../shared/sidebar.js?v=5"></script>
  <script src="script.js"></script>
</body>
</html>
