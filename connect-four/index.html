<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connect Four</title>
<link rel="stylesheet" href="../shared/themes.css?v=5">
<link rel="stylesheet" href="../shared/common.css?v=5">
<link rel="stylesheet" href="../shared/sidebar.css?v=5">
<link rel="stylesheet" href="style.css">
<script>window.SITE_ROOT = "../";</script>
</head>
<body data-game="connect4">
  <aside id="sidebar" class="sidebar"></aside>
  <div class="content">
  <main class="game">
    <h1>Connect Four</h1>

    <div id="tabs" class="tabs">
      <button class="tab-btn" data-tab="play">Play</button>
      <button class="tab-btn" data-tab="stats">Stats</button>
      <button class="tab-btn" data-tab="history">History</button>
      <button class="tab-btn" data-tab="ranked">Ranked</button>
      <button class="tab-btn" data-tab="themes">Themes</button>
    </div>

    <div id="playView">
      <div id="modeChoice" class="difficulty">
        <button class="mode-btn" data-mode="ai">vs AI</button>
        <button class="mode-btn" data-mode="twoPlayer">2 Player</button>
      </div>

      <div id="matchTypeChoice" class="difficulty">
        <button class="matchtype-btn" data-matchtype="casual">Casual</button>
        <button class="matchtype-btn" data-matchtype="ranked">Ranked</button>
      </div>

      <div id="symbolChoice" class="difficulty">
        <button class="symbol-btn" data-symbol="R">Play as Red</button>
        <button class="symbol-btn" data-symbol="Y">Play as Yellow</button>
        <button class="symbol-btn" data-symbol="random">Random</button>
      </div>

      <div id="difficulty" class="difficulty">
        <button class="diff-btn" data-difficulty="easy">Easy</button>
        <button class="diff-btn" data-difficulty="medium">Medium</button>
        <button class="diff-btn" data-difficulty="hard">Hard</button>
        <button class="diff-btn" data-difficulty="impossible">Impossible</button>
      </div>

      <p id="rankDisplay" class="rank">Silver · 1000</p>
      <p id="youAre" class="you-are">You are Red</p>
      <p id="status" class="status">Your turn</p>

      <div id="board" class="c4-board">
        <button class="c4-cell" data-index="0"></button>
        <button class="c4-cell" data-index="1"></button>
        <button class="c4-cell" data-index="2"></button>
        <button class="c4-cell" data-index="3"></button>
        <button class="c4-cell" data-index="4"></button>
        <button class="c4-cell" data-index="5"></button>
        <button class="c4-cell" data-index="6"></button>
        <button class="c4-cell" data-index="7"></button>
        <button class="c4-cell" data-index="8"></button>
        <button class="c4-cell" data-index="9"></button>
        <button class="c4-cell" data-index="10"></button>
        <button class="c4-cell" data-index="11"></button>
        <button class="c4-cell" data-index="12"></button>
        <button class="c4-cell" data-index="13"></button>
        <button class="c4-cell" data-index="14"></button>
        <button class="c4-cell" data-index="15"></button>
        <button class="c4-cell" data-index="16"></button>
        <button class="c4-cell" data-index="17"></button>
        <button class="c4-cell" data-index="18"></button>
        <button class="c4-cell" data-index="19"></button>
        <button class="c4-cell" data-index="20"></button>
        <button class="c4-cell" data-index="21"></button>
        <button class="c4-cell" data-index="22"></button>
        <button class="c4-cell" data-index="23"></button>
        <button class="c4-cell" data-index="24"></button>
        <button class="c4-cell" data-index="25"></button>
        <button class="c4-cell" data-index="26"></button>
        <button class="c4-cell" data-index="27"></button>
        <button class="c4-cell" data-index="28"></button>
        <button class="c4-cell" data-index="29"></button>
        <button class="c4-cell" data-index="30"></button>
        <button class="c4-cell" data-index="31"></button>
        <button class="c4-cell" data-index="32"></button>
        <button class="c4-cell" data-index="33"></button>
        <button class="c4-cell" data-index="34"></button>
        <button class="c4-cell" data-index="35"></button>
        <button class="c4-cell" data-index="36"></button>
        <button class="c4-cell" data-index="37"></button>
        <button class="c4-cell" data-index="38"></button>
        <button class="c4-cell" data-index="39"></button>
        <button class="c4-cell" data-index="40"></button>
        <button class="c4-cell" data-index="41"></button>
      </div>

      <div class="controls">
        <div class="score" id="scoreRow">
          <span><span id="scoreLabel1">Wins</span>: <span id="score1">0</span></span>
          <span>Draws: <span id="scoreDraws">0</span></span>
          <span><span id="scoreLabel2">Losses</span>: <span id="score2">0</span></span>
        </div>
        <button id="reset" class="reset-btn">Restart Round</button>
      </div>
    </div>

    <div id="statsView" class="hidden">
      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-label">Current Streak</span>
          <span class="stat-value" id="statCurrentStreak">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Best Streak</span>
          <span class="stat-value" id="statBestStreak">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Total Games</span>
          <span class="stat-value" id="statTotalGames">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Total Record</span>
          <span class="stat-value" id="statTotalRecord">0-0-0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Win Rate</span>
          <span class="stat-value" id="statWinRate">0%</span>
        </div>
        <div class="stat-card">
          <span class="stat-label" id="statLast10Label">Last 10 Win Rate</span>
          <span class="stat-value" id="statLast10">0%</span>
        </div>
      </div>
      <p class="stats-note">Stats track ranked games played against the AI only.</p>
    </div>

    <div id="historyView" class="hidden">
      <div id="historyList" class="history-list"></div>
      <div id="historyDetail" class="history-detail hidden">
        <button id="backToHistory" class="reset-btn">&larr; Back to list</button>
        <div id="historyDetailContent" class="history-detail-content"></div>
        <div id="historyBoard" class="c4-board mini-board"></div>
      </div>
    </div>

    <div id="rankedView" class="hidden">
      <div class="ranked-summary">
        <span class="ranked-points" id="rankedPoints">1000</span>
        <span class="ranked-tier" id="rankedTier">Silver</span>
      </div>
      <div id="rankChart" class="rank-chart"></div>
      <div id="tierLadder" class="tier-ladder"></div>
      <p class="stats-note">Tracks your rank point history in ranked vs AI games.</p>
    </div>

    <div id="themesView" class="hidden">
      <div class="theme-grid">
        <button class="theme-btn" data-theme="indigo">
          <span class="theme-swatch theme-swatch-indigo"></span>
          Current
        </button>
        <button class="theme-btn" data-theme="mono">
          <span class="theme-swatch theme-swatch-mono"></span>
          Black &amp; White
        </button>
        <button class="theme-btn" data-theme="blue-green">
          <span class="theme-swatch theme-swatch-blue-green"></span>
          Blue &amp; Green
        </button>
        <button class="theme-btn" data-theme="red-white">
          <span class="theme-swatch theme-swatch-red-white"></span>
          Red &amp; White
        </button>
      </div>
    </div>
  </main>
  </div>

  <script src="../shared/theme.js?v=5"></script>
  <script src="../shared/sidebar.js?v=5"></script>
  <script src="script.js"></script>
</body>
</html>
